name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
